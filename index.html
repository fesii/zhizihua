<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>公告平台</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <div>
          <p class="eyebrow">实时公告</p>
          <h1 id="site-title">公告平台</h1>
        </div>
        <div class="status">
          <span>更新时间</span>
          <strong id="updated-at">加载中</strong>
        </div>
      </header>

      <section class="notice" aria-label="公告">
        <div class="notice-mark">!</div>
        <p id="notice-text">正在读取公告内容...</p>
      </section>

      <nav class="time-tabs" id="time-tabs" aria-label="时间标签"></nav>

      <div class="copy-all-bar">
        <button id="copy-all-prices" class="copy-button" type="button">复制全部价格模板</button>
      </div>

      <section class="history-box" aria-label="查询历史价格">
        <div class="history-head">
          <div>
            <h2>历史价格</h2>
            <p>输入日期查询当天所有时间段</p>
          </div>
          <div class="history-controls">
            <input id="history-date" type="date">
            <button id="history-search" type="button">查询</button>
          </div>
        </div>
        <div id="history-result" class="history-result"></div>
      </section>

      <section id="content" class="content" aria-live="polite"></section>
    </main>

    <template id="section-template">
      <article class="panel">
        <header class="panel-head">
          <div>
            <h2></h2>
            <p class="meta"></p>
          </div>
          <button class="copy-button" type="button">复制</button>
        </header>
        <div class="groups"></div>
      </article>
    </template>

    <template id="group-template">
      <div class="group">
        <h3></h3>
        <div class="items"></div>
      </div>
    </template>

    <template id="item-template">
      <div class="item">
        <span class="label"></span>
        <strong class="value"></strong>
      </div>
    </template>

    <script src="./script.js"></script>
  </body>
</html>
