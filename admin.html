<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>公告管理</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="./admin.css">
  </head>
  <body>
    <main class="page admin-page">
      <header class="topbar">
        <div>
          <p class="eyebrow">管理页面</p>
          <h1>公告管理</h1>
        </div>
        <div class="admin-actions">
          <button id="open-file" type="button">打开 data.json</button>
          <button id="save-file" type="button">保存到本机</button>
          <button id="save-github" type="button">保存到 GitHub</button>
          <a class="view-link" href="./index.html" target="_blank" rel="noreferrer">查看公告页</a>
        </div>
      </header>

      <section class="notice admin-note" aria-label="状态">
        <div class="notice-mark">i</div>
        <p id="save-status">正在读取 data.json...</p>
      </section>

      <section class="admin-card">
        <label>
          平台标题
          <input id="site-title-input" type="text">
        </label>
        <label>
          默认展示时间
          <select id="active-time-input"></select>
        </label>
      </section>

      <section class="admin-card github-card">
        <label>
          GitHub 用户名
          <input id="github-owner" type="text" value="fesii">
        </label>
        <label>
          仓库名
          <input id="github-repo" type="text" value="czmnb666">
        </label>
        <label>
          分支
          <input id="github-branch" type="text" value="main">
        </label>
        <label>
          文件路径
          <input id="github-path" type="text" value="data.json">
        </label>
        <label class="token-field">
          GitHub Token
          <input id="github-token" type="text" placeholder="只在当前页面使用，不会保存到文件里">
        </label>
        <button id="load-github" type="button">读取 GitHub 最新内容</button>
      </section>

      <nav class="time-tabs" id="time-tabs" aria-label="时间标签"></nav>

      <section class="admin-toolbar">
        <button id="add-time" type="button">新增时间</button>
        <button id="copy-time" type="button">复制当前时间</button>
        <button id="delete-time" type="button">删除当前时间</button>
      </section>

      <section class="admin-card import-card">
        <label>
          粘贴价格文字
          <textarea id="paste-prices" rows="8" placeholder="例如：&#10;7.1&#10;小刀&#10;普通875 加速88 超速885 高速89 极速895 秒拉90 怪额955&#10;超怪965&#10;&#10;大额91（钱包通道 限额1000）&#10;微信通额885（100-1000）"></textarea>
        </label>
        <div class="import-actions">
          <button id="import-prices" type="button">识别到当前时间</button>
          <button id="clear-import" type="button">清空</button>
        </div>
      </section>

      <section id="editor" class="content" aria-live="polite"></section>
    </main>

    <template id="page-template">
      <article class="panel admin-panel">
        <header class="panel-head">
          <div class="admin-grid">
            <label>
              时间
              <input data-field="time" type="text" placeholder="例如 14:00">
            </label>
            <label>
              更新时间
              <input data-field="updatedAt" type="text" placeholder="例如 2026-06-29 14:00">
            </label>
          </div>
        </header>
        <div class="admin-section-body">
          <label>
            这一时间的公告
            <textarea data-field="notice" rows="3"></textarea>
          </label>
          <div class="section-list"></div>
          <button class="add-section" type="button">新增板块</button>
        </div>
      </article>
    </template>

    <template id="section-editor-template">
      <article class="panel section-editor">
        <header class="panel-head">
          <div class="admin-grid">
            <label>
              板块名称
              <input data-field="title" type="text">
            </label>
            <label>
              副标题
              <input data-field="subtitle" type="text">
            </label>
            <label>
              链接文字
              <input data-field="linkText" type="text">
            </label>
            <label>
              颜色
              <select data-field="accent">
                <option value="blue">蓝色</option>
                <option value="yellow">黄色</option>
              </select>
            </label>
          </div>
          <button class="danger remove-section" type="button">删除板块</button>
        </header>
        <div class="groups"></div>
        <div class="admin-row-actions">
          <label>
            复制内容
            <textarea data-field="copyText" rows="2"></textarea>
          </label>
          <button class="add-group" type="button">新增分组</button>
        </div>
      </article>
    </template>

    <template id="group-editor-template">
      <div class="group group-editor">
        <label class="group-name">
          分组名称
          <input data-field="name" type="text">
        </label>
        <div>
          <div class="items"></div>
          <div class="admin-row-actions">
            <button class="add-item" type="button">新增价格</button>
            <button class="danger remove-group" type="button">删除分组</button>
          </div>
        </div>
      </div>
    </template>

    <template id="item-editor-template">
      <div class="item item-editor">
        <label>
          名称
          <input data-field="label" type="text">
        </label>
        <label>
          价格
          <input data-field="value" type="text">
        </label>
        <label class="check-label">
          <input data-field="highlight" type="checkbox">
          红色
        </label>
        <button class="danger remove-item" type="button">删除</button>
      </div>
    </template>

    <script src="./admin.js"></script>
  </body>
</html>
